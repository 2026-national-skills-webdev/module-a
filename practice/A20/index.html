<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="radio" name="page" id="p1l" checked>
    <input type="radio" name="page" id="p2l">
    <input type="radio" name="page" id="p3l">
    <input type="radio" name="page" id="p4l">

    <input type="radio" name="page" id="p1r">
    <input type="radio" name="page" id="p2r">
    <input type="radio" name="page" id="p3r">
    <input type="radio" name="page" id="p4r">

    <div class="book">
        <div class="page page-1 left"></div>

        <div class="sheet">
            <div class="page page-1 right"></div>
            <div class="page page-2 left"></div>
        </div>

        <div class="page page-2 right"></div>
    </div>
    <div class="controls">
        <label for="p4l">&#x276E;</label>
        <label for="p1r">&#x276F;</label>
        <label for="p1l">&#x276E;</label>
        <label for="p2r">&#x276F;</label>
        <label for="p2l">&#x276E;</label>
        <label for="p3r">&#x276F;</label>
        <label for="p3l">&#x276E;</label>
        <label for="p4r">&#x276F;</label>
    </div>
</body>
</html>
