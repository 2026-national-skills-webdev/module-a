<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar">
        <div class="group-1">
            <div class="button previous">이전</div>
            <span class="text-1">2026년 4월</span>
            <div class="button next">다음</div>
        </div>
        <div class="table">
            <div class="thead">
                <div>일</div>
                <div>월</div>
                <div>화</div>
                <div>수</div>
                <div>목</div>
                <div>금</div>
                <div>토</div>
            </div>
            <div class="tbody"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
